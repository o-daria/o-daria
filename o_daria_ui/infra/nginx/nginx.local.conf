# nginx config for local full-stack testing via docker-compose.local.yml.
# Serves shell from document root; MFEs from prefixed subdirectories.
# Proxies /api/ → api container on port 3300.

server {
    listen 80;
    server_name localhost;

    # Root: shell SPA (publicPath: "/")
    root /usr/share/nginx/html;
    index index.html;

    # ── MFE: mfe-auth ─────────────────────────────────────────────────────────
    location /mfe-auth/ {
        alias /usr/share/nginx/html/mfe-auth/;
        try_files $uri $uri/ /mfe-auth/index.html;
    }

    # ── MFE: mfe-projects ─────────────────────────────────────────────────────
    location /mfe-projects/ {
        alias /usr/share/nginx/html/mfe-projects/;
        try_files $uri $uri/ /mfe-projects/index.html;
    }

    # ── MFE: mfe-reports ──────────────────────────────────────────────────────
    location /mfe-reports/ {
        alias /usr/share/nginx/html/mfe-reports/;
        try_files $uri $uri/ /mfe-reports/index.html;
    }

    # ── MFE: mfe-canva ────────────────────────────────────────────────────────
    location /mfe-canva/ {
        alias /usr/share/nginx/html/mfe-canva/;
        try_files $uri $uri/ /mfe-canva/index.html;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    # Strips /api prefix before forwarding to BE (matches shell devServer proxy behavior)
    location /api/ {
        proxy_pass http://api:3300/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Shell SPA fallback ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
