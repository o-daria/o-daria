<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>o_daria — Audience Analysis</title>

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />

    <!--
      Google Fonts — Chinoiserie typography
      IMPORTANT: The integrity hash below is a placeholder.
      Generate the actual SRI hash at build time:
        curl -s "https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500&display=swap" | openssl dgst -sha384 -binary | openssl base64 -A
      Then replace the placeholder with: sha384-<hash>
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500&display=swap"
      integrity="sha384-REPLACE_WITH_ACTUAL_SRI_HASH_AT_BUILD_TIME"
      crossorigin="anonymous"
    />

    <meta name="theme-color" content="#1C2B22" />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
