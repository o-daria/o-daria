name: Deploy FE

on:
  push:
    branches: [main]
    paths:
      - "ui/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all apps
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_MFE_AUTH_URL: ${{ secrets.VITE_MFE_AUTH_URL }}
          VITE_MFE_PROJECTS_URL: ${{ secrets.VITE_MFE_PROJECTS_URL }}
          VITE_MFE_REPORTS_URL: ${{ secrets.VITE_MFE_REPORTS_URL }}
          VITE_MFE_CANVA_URL: ${{ secrets.VITE_MFE_CANVA_URL }}
        run: pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync apps/shell/dist/        s3://${{ secrets.S3_BUCKET }}/          --delete
          aws s3 sync apps/mfe-auth/dist/     s3://${{ secrets.S3_BUCKET }}/mfe-auth/ --delete
          aws s3 sync apps/mfe-projects/dist/ s3://${{ secrets.S3_BUCKET }}/mfe-projects/ --delete
          aws s3 sync apps/mfe-reports/dist/  s3://${{ secrets.S3_BUCKET }}/mfe-reports/ --delete
          aws s3 sync apps/mfe-canva/dist/    s3://${{ secrets.S3_BUCKET }}/mfe-canva/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"
