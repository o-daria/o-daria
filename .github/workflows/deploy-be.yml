name: Deploy BE

on:
  push:
    branches: [main]
    paths:
      - "api/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          platforms: linux/amd64
          push: true
          tags: ghcr.io/o-daria/o-daria-be:latest

  deploy:
    runs-on: ubuntu-latest
    environment: prod
    needs: build

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Pull latest image and restart via SSM
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["set -e; cd /opt/o-daria && docker compose pull api && docker compose up -d --no-deps api"]}' \
            --output text \
            --query "Command.CommandId")

          if [ -z "$COMMAND_ID" ]; then
            echo "Failed to send command"
            exit 1
          fi
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command to complete
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --cli-read-timeout 0 \
            --cli-connect-timeout 60

      - name: Check command result
        run: |
          RESULT=$(aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --output json)
          echo "=== Status ==="
          echo "$RESULT" | jq -r '.Status'
          echo "=== stdout ==="
          echo "$RESULT" | jq -r '.StandardOutputContent'
          echo "=== stderr ==="
          echo "$RESULT" | jq -r '.StandardErrorContent'
          STATUS=$(echo "$RESULT" | jq -r '.Status')
          [ "$STATUS" = "Success" ]
